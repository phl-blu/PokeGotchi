# Tamagotchi Commit Tracker Configuration
app.name=Tamagotchi Commit Tracker
app.version=1.0.0

# Performance and Optimization Settings
# Polling configuration - how often to check for new commits (seconds)
polling.interval.seconds=300

# Repository limits for performance
repository.max.commits=100
repository.max.count=50
repository.scan.depth=3
repository.scan.timeout.seconds=60

# Memory management
commit.history.limit=500

# Sprite caching and lazy loading
animation.sprite.caching.enabled=true
animation.sprite.cache.max=100
animation.sprite.lazy.loading.enabled=true

# UI transitions and visual feedback
ui.transition.duration.ms=300
ui.transitions.smooth.enabled=true

# Widget configuration
widget.compact.width=80
widget.compact.height=80
widget.expanded.width=320
widget.expanded.height=450

# XP System configuration
xp.evolution.thresholds=0,200,800,2000
xp.base.per.commit=10

# Animation configuration
animation.frame.duration.ms=500
animation.frames.per.state=4